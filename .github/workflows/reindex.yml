name: Rebuild index.json

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: rebuild-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reindex:
    runs-on: ubuntu-latest
    # Only run when a human pushes a commit whose message starts with [new],
    # or on manual dispatch. Keeps the bot's own index commits from looping
    # and skips ordinary edits that don't add library items.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, '[new]')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild index.json
        id: build
        run: |
          # item count from the previously committed index.json (before this rebuild)
          PREV=$(git show HEAD:index.json 2>/dev/null | jq 'length' 2>/dev/null || echo 0)
          [ -z "$PREV" ] && PREV=0
          python build_index.py > /tmp/buildout.txt 2>&1 || { cat /tmp/buildout.txt; exit 1; }
          cat /tmp/buildout.txt
          COUNT=$(grep -oP 'books indexed:\s*\K[0-9]+' /tmp/buildout.txt | head -1)
          SIZE=$(grep -oP 'index.json size:\s*\K[0-9.]+ MB' /tmp/buildout.txt | head -1)
          HOSTED=$(grep -oP 'self-hosted files:\s*\K.*' /tmp/buildout.txt | head -1)
          # fall back to counting the freshly built file if the log line changes
          [ -z "$COUNT" ] && COUNT=$(jq 'length' index.json 2>/dev/null)
          DELTA=$(( ${COUNT:-0} - ${PREV:-0} ))
          echo "count=${COUNT:-?}" >> "$GITHUB_OUTPUT"
          echo "size=${SIZE:-?}" >> "$GITHUB_OUTPUT"
          echo "hosted=${HOSTED:-?}" >> "$GITHUB_OUTPUT"
          echo "prev=${PREV}" >> "$GITHUB_OUTPUT"
          echo "delta=${DELTA}" >> "$GITHUB_OUTPUT"

      - name: Commit index.json if changed
        id: commit
        run: |
          git config user.name "taynotfound"
          git config user.email "marztayron@gmail.com"
          if git diff --quiet -- index.json feed.xml opds.xml search-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "index.json unchanged, nothing to commit"
          else
            for f in index.json feed.xml opds.xml search-index.json; do [ -f "$f" ] && git add "$f"; done
            git commit -m "chore: rebuild index.json + feed/opds/search"
            # another [new] batch may have landed while we were building;
            # rebase our index commit on top, preferring our freshly built index.json
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "push rejected, rebasing (attempt $attempt)"
              git pull --rebase -X ours origin main || git rebase --abort
              sleep 2
            done
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.OSLOG_DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            DELTA="${{ steps.build.outputs.delta }}"
            if [ "${DELTA:-0}" -gt 0 ]; then
              EMOJI="📚"; TITLE="index rebuilt"
              DESC="**${{ steps.build.outputs.count }}** items (+${DELTA}) · ${{ steps.build.outputs.size }} · 🗄️ ${{ steps.build.outputs.hosted }}"
            elif [ "${DELTA:-0}" -lt 0 ]; then
              EMOJI="📚"; TITLE="index rebuilt"
              DESC="**${{ steps.build.outputs.count }}** items (${DELTA}) · ${{ steps.build.outputs.size }} · 🗄️ ${{ steps.build.outputs.hosted }}"
            else
              EMOJI="✅"; TITLE="index checked"
              DESC="**${{ steps.build.outputs.count }}** items · no change"
            fi
          else
            EMOJI="💥"; TITLE="reindex failed"
            DESC="build broke on this push"
          fi
          RUN="<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
          CMP="<https://github.com/${{ github.repository }}/commit/${{ github.sha }}>"
          MSG=$(printf '%s **[%s](%s)**\n%s\n-# %s · pushed by %s' \
            "$EMOJI" "$TITLE" "$RUN" "$DESC" "[$(echo ${{ github.sha }} | cut -c1-7)]($CMP)" "${{ github.actor }}")
          jq -n --arg c "$MSG" \
            '{username:"foxbot", avatar_url:"https://github.com/taynotfound.png", content:$c}' \
            > /tmp/payload.json
          curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" --data-binary @/tmp/payload.json

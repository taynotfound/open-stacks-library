name: Build index

on:
  push:
    branches: [main]
    paths:
      - "books/**"
      - "build_index.py"
  workflow_dispatch:

jobs:
  build:
    # Skip commits made by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build index + chunks
        run: python3 build_index.py

      - name: Commit updated index
        run: |
          git config user.name "taynotfound"
          git config user.email "marztayron@gmail.com"
          git add index.json index-*.json index-meta.json feed.xml opds.xml search-index.json
          git diff --cached --quiet || git commit -m "chore: rebuild index [skip ci]"
          git push
